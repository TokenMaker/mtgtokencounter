<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTG Nexus Controller</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #22c55e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin: 0 0 20px 0; font-weight: 700; text-align: center; color: var(--primary); }

        .status-bar {
            font-size: 0.8rem;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .quick-select-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .token-chip {
            background: #334155;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .token-chip:active { background: var(--primary); transform: scale(0.95); }

        .update-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .update-btn:active { transform: scale(0.98); opacity: 0.9; }

        #connectBtn { background: #475569; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Token Commander</h2>
        
        <button id="connectBtn" class="update-btn">Pair with Board</button>
        <div id="status" class="status-bar">Status: Not Connected</div>

        <div class="input-group">
            <label>Token Name</label>
            <input type="text" id="tokenType" placeholder="Zombie, Elf, Clue..." list="token-suggestions">
        </div>

        <div class="input-group">
            <label>Quantity</label>
            <input type="number" id="tokenCount" placeholder="0" inputmode="numeric">
        </div>

        <label>Common Types</label>
        <div class="quick-select-grid">
            <div class="token-chip" onclick="setToken('Treasure')">Treasure</div>
            <div class="token-chip" onclick="setToken('Clue')">Clue</div>
            <div class="token-chip" onclick="setToken('Food')">Food</div>
            <div class="token-chip" onclick="setToken('Soldier')">Soldier</div>
            <div class="token-chip" onclick="setToken('Spirit')">Spirit</div>
            <div class="token-chip" onclick="setToken('Human')">Human</div>
            <div class="token-chip" onclick="setToken('Moogle')">Moogle</div>
            <div class="token-chip" onclick="setToken('Angel')">Angel</div>
        </div>

        <button class="update-btn" onclick="sendToBoard()">Update Display</button>
    </div>

    <script>
        let bleDevice, bleCharacteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        async function connect() {
            try {
                const status = document.getElementById('status');
                status.innerText = "Searching...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'MTG-Token-Counter' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                status.innerText = "Status: Connected to Board";
                status.style.color = "#22c55e";
                document.getElementById('connectBtn').style.display = "none";
            } catch (error) {
                document.getElementById('status').innerText = "Status: Connection Failed";
                console.log(error);
            }
        }

        function setToken(name) {
            document.getElementById('tokenType').value = name;
        }

        async function sendToBoard() {
            if (!bleCharacteristic) return alert("Please connect to your board first!");
            
            const type = document.getElementById('tokenType').value || "TOKEN";
            const count = document.getElementById('tokenCount').value || "0";
            
            const message = `${type}:${count}`;
            const encoder = new TextEncoder();
            
            try {
                await bleCharacteristic.writeValue(encoder.encode(message));
                // Visual feedback
                const btn = document.querySelector('.update-btn');
                const originalText = btn.innerText;
                btn.innerText = "Sent!";
                btn.style.background = "#22c55e";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#6366f1";
                }, 1000);
            } catch (e) {
                alert("Failed to send. Reconnect and try again.");
            }
        }

        document.getElementById('connectBtn').addEventListener('click', connect);
    </script>
</body>
</html>
